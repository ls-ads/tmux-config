# Position status bar on top
set-option -g status-position top

# Make colors match nvim
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Set prefix key
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Open panes/windows in current working directory
bind '"' split-window -v -c "#{pane_current_path}"
bind '%' split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Use remove window path label on tabs
set -g @catppuccin_window_default_text "null"
set -g @catppuccin_window_current_text "#{window_name}"

# Start window indexing from 1
set -g base-index 1

# Copy to system clipboard from SSH client
set -g set-clipboard on

# Use vi key bindings in copy mode
setw -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'V' send -X select-line
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux'

# tmux-navigator: seamless <C-h/j/k/l> between nvim splits and tmux panes
# (companion to christoomey/vim-tmux-navigator in nvim)
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
bind-key -T copy-mode-vi 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -T copy-mode-vi 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -T copy-mode-vi 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -T copy-mode-vi 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

# Configure catppuccin
set -g @catppuccin_status_modules_right "application session date_time"
set -g @catppuccin_date_time_text "%Y-%m-%d %H:%M:%S"

# Exit copy mode with Escape
bind-key -T copy-mode 'Escape' send -X cancel
bind-key -T copy-mode-vi 'Escape' send -X cancel

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
